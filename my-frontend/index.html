<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Tier Docker Application</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #response { margin-top: 20px; font-weight: bold; color: #28a745; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Docker 3-Tier Architecture Test</h1>
        <p>Click the button below to test the connection from <strong>Frontend (Nginx)</strong> &rarr; <strong>Backend (Python)</strong> &rarr; <strong>Database (MongoDB)</strong>.</p>
        <button id="fetchBtn">Connect Stack</button>
        <div id="response">Waiting for execution...</div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
