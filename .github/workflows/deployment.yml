name: "Test to run workflow manually v12"

on:
  workflow_dispatch:
    inputs:
      instance_size:
        description: "Enter AWS credential"
        default: "t3.micro"
        type: string
    
jobs:
  provision-infrastructure:
    runs-on: ubuntu-latest

    steps:
      - name: "Echo AWS instance size"
        run: echo "Provisioning AWS instance of size ${{ inputs.instance_size }}"

