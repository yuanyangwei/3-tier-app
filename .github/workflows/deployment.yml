name: "Test to run workflow manually"

on:
  workflow_dispatch:
    inputs:
      instance_size:
        description: "Enter AWS instance size"
        default: "t3.micro"
        type: string

jobs:
  provision-infrastructure:
    runs_on: ubuntu-latest
    
    steps:
      - name: "Echo AWS instance size"
        run: echo "Provisioning AWS instance of size: ${{ inputs.instance_size}}"
