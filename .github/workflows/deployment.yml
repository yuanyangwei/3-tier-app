name: "Test to run workflow manually"

run-name: Deploy to ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      instance_size:
        description: "Enter AWS Instance Size"
        default: "t3.micro"
        type: string                       # ◄ Always define the data type for clarity!

jobs:
  provision-infrastructure:                # 1. First, name your job group
    runs-on: ubuntu-latest                 # 2. Tell GitHub WHERE to run it
    
    steps:                                 # 3. Now, list your steps underneath
      - name: "Echo AWS instance size"
        run: echo "Provisioning an AWS instance of size: ${{ inputs.instance_size }}"
